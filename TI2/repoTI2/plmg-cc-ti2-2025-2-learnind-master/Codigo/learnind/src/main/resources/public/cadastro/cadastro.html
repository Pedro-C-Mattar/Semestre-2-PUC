<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Learnind</title>
  <link rel="stylesheet" href="cadastro.css">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <!-- ====== HEADER ====== -->
  <header>
    <div class="container header-content">
      <h1 class="logo"><a id="logo-link" href="/landPage/index.html">Learnind</a></h1>
      <nav>
        <ul>
          <!-- navigation links removed; only on landing page -->
        </ul>
      </nav>
      <div class="buttons">
        <button class="login" onclick="window.location.href='../login/login.html'">Login</button>
        <button class="cadastro" onclick="window.location.href='../cadastro/cadastro.html'">Cadastro</button>
      </div>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <main class="register-wrapper">
    <div class="register-box">
      <div class="image-side">
        <img src="img_Cadastro.png" alt="Pessoa estudando online">
      </div>

      <div class="form-side">
        <h2>Crie sua conta</h2>
        <p class="subtitle">Comece sua jornada de aprendizado na Learnind hoje mesmo!</p>

        <form action="/usuario/register" method="post">
          <label>Nome</label>
          <input type="text" name="nome" placeholder="Seu nome" required>

          <label>Email</label>
          <input type="email" name="email" placeholder="Seu email" required>

          <label>Senha</label>
          <input type="password" name="senha" placeholder="Sua senha" required>

          <div class="row">
            <div class="col">
              <label>Data de nascimento</label>
              <input type="date" name="data_nascimento" required>
            </div>
            <div class="col">
              <label>Sexo</label>
              <select name="sexo" required>
                <option value="">Selecione</option>
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
                <option value="O">Outro</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-register">Cadastrar</button>

          <p class="terms">
            Ao se cadastrar, você concorda com os
            <a href="#">Termos</a> e <a href="#">Políticas</a> da Learnind.
          </p>

          <p class="login-text">
            Já tem uma conta? <a href="../login/login.html">Faça login</a>.
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- ====== FOOTER ====== -->
  <footer>
    <p>© 2025 Learnind — Todos os direitos reservados.</p>
  </footer>
  <script src="/js/session.js"></script>
  <script>
    // if already logged in, go to dashboard directly
    isLogged().then(function(logged) {
      if (logged) {
        window.location.href = '/homePage/dashboard.html';
      }
    }).catch(function(){});
  </script>
  <script>
    // set logo link depending on auth state (logged -> dashboard, else -> landing)
    (async () => {
      try {
        const logged = await isLogged();
        const el = document.getElementById('logo-link');
        if (el) el.href = logged ? '/homePage/dashboard.html' : '/landPage/index.html';
      } catch (e) {
        const el = document.getElementById('logo-link');
        if (el) el.href = '/landPage/index.html';
      }
    })();
  </script>
</body>
</html>
